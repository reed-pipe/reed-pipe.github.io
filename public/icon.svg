<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4096ff"/>
      <stop offset="100%" style="stop-color:#1668dc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e6f4ff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Compass / star mark — represents personal assistant -->
  <!-- Outer ring -->
  <circle cx="256" cy="248" r="130" fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.3"/>
  <!-- Four-point star / compass -->
  <path d="M256 108 L280 220 L392 248 L280 276 L256 388 L232 276 L120 248 L232 220 Z" fill="url(#accent)"/>
  <!-- Center dot -->
  <circle cx="256" cy="248" r="22" fill="url(#bg)"/>
  <circle cx="256" cy="248" r="12" fill="url(#accent)"/>
  <!-- Small text hint at bottom -->
  <text x="256" y="446" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="6">助手</text>
</svg>
